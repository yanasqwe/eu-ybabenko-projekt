<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Europäische Union - Startseite</title>
  <meta name="description" content="Ein Schulprojekt über die Europäische Union: Geschichte, Mitgliedsländer und weltweiter Einfluss.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23003399'/><text x='50' y='60' font-size='40' text-anchor='middle' fill='%23ffcc00'>★</text></svg>">
</head>
<body data-page="home">

  <section class="hero">
    <div class="container hero-grid">
      <div class="reveal">
        <span class="badge"><span class="dot"></span><span data-i18n="home.badge"></span></span>
        <h1><span data-i18n="home.title1"></span> <span class="grad" data-i18n="home.titleGrad"></span></h1>
        <p class="lead" data-i18n="home.subtitle"></p>
        <div class="hero-cta">
          <a class="btn btn-primary" href="chronologie.html" data-i18n="cta.explore"></a>
          <a class="btn btn-ghost" href="kontakt.html" data-i18n="cta.contact"></a>
        </div>
      </div>
      <div class="reveal d2">
        <figure class="flag-figure">
          <svg id="euFlag" viewBox="0 0 90 60" role="img" aria-label="Flagge der Europäischen Union"></svg>
          <figcaption data-i18n="home.flagCaption"></figcaption>
        </figure>
      </div>
    </div>
  </section>

  <section id="fakten">
    <div class="container">
      <div class="section-head reveal">
        <span class="eyebrow" data-i18n="home.factsEyebrow"></span>
        <h2 class="section-title" data-i18n="home.factsTitle"></h2>
      </div>
      <div class="stat-grid">
        <div class="stat-card reveal">
          <div class="num" data-i18n="fact.founded.n"></div>
          <div class="label" data-i18n="fact.founded.l"></div>
          <div class="desc" data-i18n="fact.founded.d"></div>
        </div>
        <div class="stat-card reveal d1">
          <div class="num" data-i18n="fact.members.n"></div>
          <div class="label" data-i18n="fact.members.l"></div>
          <div class="desc" data-i18n="fact.members.d"></div>
        </div>
        <div class="stat-card reveal d2">
          <div class="num" data-i18n="fact.pop.n"></div>
          <div class="label" data-i18n="fact.pop.l"></div>
          <div class="desc" data-i18n="fact.pop.d"></div>
        </div>
        <div class="stat-card reveal d3">
          <div class="num" data-i18n="fact.lang.n"></div>
          <div class="label" data-i18n="fact.lang.l"></div>
          <div class="desc" data-i18n="fact.lang.d"></div>
        </div>
      </div>
      <div class="note-box reveal">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1V18h6v-1.2c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2zM9 21h6M10 18v3M14 18v3"/></svg></span>
        <p data-i18n="home.foundNote"></p>
      </div>
    </div>
  </section>

  <section id="bevoelkerung">
    <div class="container">
      <div class="section-head reveal">
        <span class="eyebrow" data-i18n="chart.eyebrow"></span>
        <h2 class="section-title" data-i18n="chart.title"></h2>
        <p class="lead" data-i18n="chart.sub"></p>
      </div>
      <div class="chart reveal">
        <div id="chart-mount"></div>
        <div class="chart-legend">
          <span data-i18n="chart.legendR"></span>
        </div>
      </div>
    </div>
  </section>

  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function () {
      const svg = document.getElementById("euFlag");
      if (!svg) return;
      let stars = "";
      const cx = 45, cy = 30, r = 18;
      for (let i = 0; i < 12; i++) {
        const a = (i / 12) * Math.PI * 2 - Math.PI / 2;
        const x = (cx + r * Math.cos(a)).toFixed(2);
        const y = (cy + r * Math.sin(a)).toFixed(2);
        stars += `<text x="${x}" y="${y}" font-size="6" fill="#ffcc00" text-anchor="middle" dominant-baseline="central">★</text>`;
      }
      svg.innerHTML = `<rect width="90" height="60" fill="#003399"/>${stars}`;
    })();
  </script>
</body>
</html>
