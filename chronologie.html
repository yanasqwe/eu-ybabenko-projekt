<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EU Chronologie — Europäische Union</title>
  <meta name="description" content="Die wichtigsten Meilensteine der Europäischen Union — von der Montanunion 1951 bis heute.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23003399'/><text x='50' y='60' font-size='40' text-anchor='middle' fill='%23ffcc00'>★</text></svg>">
</head>
<body data-page="chrono">

  <section class="page-hero">
    <div class="container reveal">
      <span class="eyebrow" style="justify-content:center" data-i18n="chrono.title"></span>
      <h1><span data-i18n="chrono.title1"></span> <span class="grad" data-i18n="chrono.titleGrad"></span></h1>
      <p class="lead" data-i18n="chrono.lead"></p>
    </div>
  </section>

  <section style="padding-top:12px">
    <div class="timeline-viewport">
      <div id="timeline-mount"></div>
    </div>
  </section>

  <section style="padding-top:20px">
    <div class="container">
      <div class="section-head reveal" style="max-width:none">
        <h2 class="section-title" data-i18n="chrono.detailsTitle"></h2>
      </div>
      <div class="history">

        <article class="hist-item reveal" id="event-1951">
          <figure class="ph" style="--c1:#3a2a10;--c2:#1a1206">
            <img src="assets/images/1951.jpg" alt="1951" loading="lazy" onerror="this.remove()">
            <span class="ph-face"><span class="yr">1951</span></span>
          </figure>
          <div class="body">
            <span class="yr-tag">1951</span>
            <h3 data-i18n="hd.1951.t"></h3>
            <p data-i18n="hd.1951.p"></p>
          </div>
        </article>
