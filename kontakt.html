<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt - Europäische Union</title>
  <meta name="description" content="Stelle deine Frage zur Europäischen Union.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23003399'/><text x='50' y='60' font-size='40' text-anchor='middle' fill='%23ffcc00'>★</text></svg>">
</head>
<body data-page="contact">

  <section class="page-hero">
    <div class="container reveal">
      <span class="eyebrow" style="justify-content:center" data-i18n="contact.title"></span>
      <h1><span data-i18n="contact.title"></span> <span class="grad" data-i18n="contact.titleGrad"></span></h1>
      <p class="lead" data-i18n="contact.lead"></p>
    </div>
  </section>

  <section style="padding-top:20px">
    <div class="container">
      <div class="bot-card reveal">
        <div class="bot-head">
          <span class="bot-avatar">★</span>
          <div><b data-i18n="bot.title"></b><small data-i18n="bot.subtitle"></small></div>
        </div>
        <div class="bot-log" id="botLog"></div>
        <form class="bot-input" id="botForm" novalidate>
          <input type="text" id="botText" data-i18n-ph="bot.ph" autocomplete="off" aria-label="Bot">
          <button type="submit" class="btn btn-gold" data-i18n="bot.send"></button>
        </form>
        <p class="bot-note" data-i18n-html="bot.note"></p>
      </div>
    </div>
  </section>

  <section style="padding-top:20px">
    <div class="container">
      <div class="contact-grid">

        <div class="form-card reveal">
          <form id="contactForm" novalidate>
            <div class="field">
              <label for="email" data-i18n="contact.emailL"></label>
              <input type="email" id="email" name="email" required data-i18n-ph="contact.emailP">
            </div>
            <div class="field">
              <label for="message" data-i18n="contact.msgL"></label>
              <textarea id="message" name="message" required data-i18n-ph="contact.msgP"></textarea>
            </div>
            <button type="submit" class="btn btn-gold" data-i18n="contact.send"></button>
            <p class="form-note" data-i18n="contact.note"></p>
            <div class="form-status" id="formStatus" role="status"></div>
          </form>
        </div>

        <aside class="contact-aside reveal d2">
          <div class="info-item">
            <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 6 10 7L22 6"/></svg></span>
            <div><b data-i18n="contact.iEmailT"></b><span>babenko.yana2206@gmail.com</span></div>
          </div>
          <div class="info-item">
            <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span>
            <div><b data-i18n="contact.iAnsT"></b><span data-i18n="contact.iAnsD"></span></div>
          </div>
          <div class="info-item">
            <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.5 2.5 15 0 18M12 3c-2.5 2.5-2.5 15 0 18"/></svg></span>
            <div><b data-i18n="contact.iTopicT"></b><span data-i18n="contact.iTopicD"></span></div>
          </div>
        </aside>

      </div>
    </div>
  </section>

  <script src="js/i18n.js"></script>
  <script src="js/countries.js"></script>
  <script src="js/main.js"></script>
  <script src="js/bot.js"></script>
</body>
</html>
