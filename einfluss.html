<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EU & Welt — Der Einfluss der EU</title>
  <meta name="description" content="Wie die Europäische Union durch Markt, Standards und Werte die ganze Welt beeinflusst.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23003399'/><text x='50' y='60' font-size='40' text-anchor='middle' fill='%23ffcc00'>★</text></svg>">
</head>
<body data-page="influence">

  <section class="page-hero">
    <div class="container reveal">
      <span class="eyebrow" style="justify-content:center" data-i18n="nav.influence"></span>
      <h1>Der Einfluss der EU <span class="grad" data-i18n="inf.titleGrad"></span></h1>
      <p class="lead" data-i18n="inf.lead"></p>
    </div>
  </section>

  <section style="padding-top:20px">
    <div class="container">
      <article class="article">

        <figure class="ph reveal" style="--c1:#16305f;--c2:#0a1a3a">
          <img src="assets/images/welt.jpg" alt="EU & Welt" loading="lazy" onerror="this.remove()">
          <span class="ph-face"><span class="yr">EU · WORLD</span></span>
        </figure>

        <h2 class="reveal" data-i18n="inf.h1"></h2>
        <p class="reveal" data-i18n="inf.p1"></p>

        <h2 class="reveal" data-i18n="inf.h2"></h2>
        <p class="reveal" data-i18n="inf.p2"></p>

        <div class="callout reveal">
          <p data-i18n-html="inf.callout"></p>
        </div>

        <h2 class="reveal" data-i18n="inf.h3"></h2>
        <p class="reveal" data-i18n="inf.p3"></p>

        <figure class="ph reveal" style="--c1:#123a2a;--c2:#081f16;min-height:220px">
          <img src="assets/images/klima.jpg" alt="Green Deal" loading="lazy" onerror="this.remove()">
          <span class="ph-face"><span class="yr">GREEN DEAL 2050</span></span>
        </figure>

        <h2 class="reveal" data-i18n="inf.h4"></h2>
        <p class="reveal" data-i18n="inf.p4"></p>

      </article>
    </div>
  </section>

  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
