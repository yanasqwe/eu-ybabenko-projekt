<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EU-Land - Europäische Union</title>
  <meta name="description" content="Wie ein EU-Land mit der Europäischen Union verbunden ist, wie es beigetreten ist und welche Schwierigkeiten es dabei gab.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23003399'/><text x='50' y='60' font-size='40' text-anchor='middle' fill='%23ffcc00'>★</text></svg>">
</head>
<body data-page="land">

  <section class="page-hero">
    <div class="container reveal">
      <span class="eyebrow" style="justify-content:flex-start" data-i18n="land.eyebrow"></span>
      <h1><span class="grad" id="landName"></span></h1>
      <p class="lead"><span data-i18n="land.since"></span> <b id="landYear"></b></p>
    </div>
  </section>

  <section style="padding-top:20px">
    <div class="container">
      <article class="article">

        <figure class="ph reveal" style="--c1:#16305f;--c2:#0a1a3a">
          <img id="landPhoto" alt="" loading="lazy" onerror="this.remove()">
          <span class="ph-face">
            <img class="land-flag" id="landFlag" alt="">
            <span class="yr" id="landCaption"></span>
          </span>
        </figure>

        <h2 class="reveal" data-i18n="land.relTitle"></h2>
        <p class="reveal" data-cland="rel"></p>

        <h2 class="reveal" data-i18n="land.joinTitle"></h2>
        <p class="reveal" data-cland="join"></p>

        <h2 class="reveal" data-i18n="land.diffTitle"></h2>
        <p class="reveal" data-cland="diff"></p>

        <a class="btn btn-ghost reveal" style="margin-top:34px" href="index.html#bevoelkerung" data-i18n="land.back"></a>

      </article>
    </div>
  </section>

  <script src="js/i18n.js"></script>
  <script src="js/countries.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
